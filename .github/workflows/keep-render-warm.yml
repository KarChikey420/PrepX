name: Keep Render Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          DEFAULT_KEEPALIVE_URL: "https://prepx-hz7r.onrender.com/health"
          KEEPALIVE_URL: ${{ vars.RENDER_KEEPALIVE_URL }}
        run: |
          url="${KEEPALIVE_URL:-$DEFAULT_KEEPALIVE_URL}"
          echo "Pinging $url"
          curl --fail --silent --show-error --max-time 30 "$url" > /dev/null
